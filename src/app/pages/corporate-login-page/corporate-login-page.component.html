<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kurumsal Giriş - Banka</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="login-container">
        <div class="login-box">
            <img src="logo.png" alt="Banka Logosu" class="logo">
            <h2>Kurumsal İnternet Şubesi</h2>

            <!-- Sekmeler -->
            <div class="tab-container">
                <button class="tab" (click)="goToLogin()">BİREYSEL</button>
                <button class="tab active">KURUMSAL</button>
            </div>

            <!-- Giriş Formu -->
            <form>
                <input type="text" placeholder="Kurumsal Müşteri Numaranız" required>
                <input type="password" placeholder="Şifre" required>
                <input type="text" placeholder="Yetkili Kullanıcı Adı" required>

                <!-- Seçenekler -->
                <div class="options">
                    <div class="switch-container">
                        <label for="rememberMe">Beni Hatırla</label>
                        <label class="switch">
                            <input type="checkbox" id="rememberMe">
                            <span class="slider"></span>
                        </label>
                    </div>
                </div>

                <button type="submit" class="btn">DEVAM</button>

                <div class="links">
                    <a href="#" class="forgot-password">Müşteri Numaramı Unuttum</a>
                    <a href="#" class="forgot-password">Şifremi Unuttum</a>
                </div>
            </form>

            <!-- Kayıt Olma -->
            <div class="register">
                <p>Dijital Bankacılık müşterimiz olmak için</p>
                <button class="btn secondary" (click)="goToRegister()">HEMEN BAŞVUR</button>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
